{% set name = "irreptables" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/irreptables-{{ version }}.tar.gz
  sha256: 6b5ac9f6aa6d1f7f9eddeae1f851a145ae8f3ac50ea9ea369bf5372169654a61

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy >=1.0
    - spglib >=1.14
    - lazy-property
    - click

test:
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/stepan-tsirkin/irrep
  summary: Tables of characters of irreducible representations for double space groups. Part of 'irrep' package
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
